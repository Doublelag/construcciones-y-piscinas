<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antonio Pool | Piscinas y Construcción</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --azul: #0a6ebd;
  --azul-oscuro: #04203a;
  --azul-medio: #0d4f7c;
  --acento: #4ec3f7;
  --blanco: #ffffff;
  --gris-claro: #f4f7fa;
  --gris: #6b7280;
  --texto: #1a2332;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--blanco);
  color: var(--texto);
  line-height: 1.6;
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 18px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(4, 32, 58, 0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(78,195,247,0.15);
  transition: background .3s;
}
nav .nav-logo {
  font-family: 'Playfair Display', serif;
  color: var(--blanco);
  font-size: 22px;
  letter-spacing: 1px;
}
nav .nav-logo span { color: var(--acento); }
nav ul {
  list-style: none;
  display: flex;
  gap: 32px;
}
nav ul a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.5px;
  transition: color .2s;
}
nav ul a:hover { color: var(--acento); }

/* ── HERO ── */
header {
  min-height: 100vh;
  background:
    linear-gradient(160deg, rgba(4,20,45,.88) 0%, rgba(10,110,189,.55) 100%),
    url("piscina-principal.jpg");
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  padding: 40px 20px;
  position: relative;
  overflow: hidden;
}
header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 80px;
  background: linear-gradient(to top, var(--blanco), transparent);
}
.hero { max-width: 800px; position: relative; z-index: 1; }
.hero-badge {
  display: inline-block;
  background: rgba(78,195,247,0.2);
  border: 1px solid rgba(78,195,247,0.5);
  color: var(--acento);
  padding: 6px 18px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 28px;
}
.logo {
  width: 180px;
  background: white;
  border-radius: 16px;
  padding: 12px;
  margin: 0 auto 16px;
  display: block;
  box-shadow: 0 12px 40px rgba(0,0,0,.3);
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 68px;
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 16px;
  text-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.hero h1 span { color: var(--acento); }
.hero p {
  font-size: 20px;
  font-weight: 300;
  margin-bottom: 40px;
  color: rgba(255,255,255,0.85);
}
.hero-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.btn-wa {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: #25d366;
  color: white;
  text-decoration: none;
  padding: 14px 28px;
  border-radius: 50px;
  font-weight: 500;
  font-size: 15px;
  transition: transform .2s, box-shadow .2s;
  box-shadow: 0 4px 20px rgba(37,211,102,0.35);
}
.btn-wa:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(37,211,102,0.45); }
.btn-wa svg { width: 20px; height: 20px; fill: white; }

/* ── SECCIONES ── */
section { max-width: 1100px; margin: auto; padding: 90px 24px; }

.section-tag {
  display: inline-block;
  color: var(--azul);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
h2 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  color: var(--azul-oscuro);
  margin-bottom: 20px;
  line-height: 1.2;
}
.section-line {
  width: 50px;
  height: 3px;
  background: var(--azul);
  margin-bottom: 40px;
  border-radius: 2px;
}

/* ── ABOUT ── */
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}
.about-text p {
  font-size: 17px;
  color: #444;
  margin-bottom: 16px;
  line-height: 1.8;
}
.owners {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 32px;
}
.owner-card {
  background: var(--gris-claro);
  border-left: 4px solid var(--azul);
  padding: 20px 24px;
  border-radius: 12px;
}
